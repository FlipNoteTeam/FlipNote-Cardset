syntax = "proto3";

package cardset;

service CardsetService {
  rpc IsCardSetViewable (IsCardSetViewableRequest) returns (IsCardSetViewableResponse);
  rpc GetCardSetsByIds (GetCardSetsByIdsRequest) returns (GetCardSetsByIdsResponse);
}

message IsCardSetViewableRequest {
  int32 card_set_id = 1;
  int32 user_id = 2;
}

message IsCardSetViewableResponse {
  bool viewable = 1;
}

message GetCardSetsByIdsRequest {
  repeated int32 card_set_ids = 1;
  int32 user_id = 2;
}

message CardSetSummary {
  int32 id = 1;
  string name = 2;
  int32 group_id = 3;
  string visibility = 4;
  string category = 5;
  string hashtag = 6;
  int64 image_ref_id = 7;
  int32 card_count = 8;
}

message GetCardSetsByIdsResponse {
  repeated CardSetSummary card_sets = 1;
}
